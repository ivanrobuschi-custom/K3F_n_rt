site_name: Documentazione Custom Spa
theme:
  name: material
  language: it
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Tema scuro
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Tema chiaro
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - search.suggest
  - search.highlight
  - content.code.copy
plugins:
- search
markdown_extensions:
- tables
- fenced_code
- admonition
- pymdownx.superfences
- toc:
    permalink: true
nav:
- Home: index.md
- MANUALE UTENTE K3-N RT:
  - Introduzione: manuale-utente-k3-n-rt/index.md
  - Descrizione del Dispositivo: manuale-utente-k3-n-rt/descrizione-del-dispositivo.md
  - Installazione e Funzionamento di Base: manuale-utente-k3-n-rt/installazione-e-funzionamento-di-base.md
  - Operazioni di Vendita e Pagamento: manuale-utente-k3-n-rt/operazioni-di-vendita-e-pagamento.md
  - Rapporti Statistici e Azzeramenti: manuale-utente-k3-n-rt/rapporti-statistici-e-azzeramenti.md
  - Servizi Telematici e Lotteria degli Scontrini: manuale-utente-k3-n-rt/servizi-telematici-e-lotteria-degli-scontrini.md
  - Programmazione e Configurazione Avanzata: manuale-utente-k3-n-rt/programmazione-e-configurazione-avanzata.md
  - Manutenzione e Specifiche Tecniche: manuale-utente-k3-n-rt/manutenzione-e-specifiche-tecniche.md
